<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fen a drari</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e8e8ec;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    background: linear-gradient(180deg, rgba(10,10,15,1) 0%, rgba(10,10,15,0.85) 100%);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    position: relative;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .live-dot {
    width: 10px;
    height: 10px;
    background: #e63946;
    border-radius: 50%;
    animation: pulse 1.6s ease-in-out infinite;
    box-shadow: 0 0 8px rgba(230, 57, 70, 0.6);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .logo h1 {
    font-size: 1.35rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ffffff 0%, #a0a0b0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(230, 57, 70, 0.12);
    border: 1px solid rgba(230, 57, 70, 0.25);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    color: #e63946;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  .player-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    background: radial-gradient(ellipse at center, rgba(30,30,50,0.4) 0%, rgba(10,10,15,1) 70%);
  }

  .player-container {
    width: 100%;
    max-width: 1200px;
    aspect-ratio: 16 / 9;
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.05),
      0 20px 60px rgba(0,0,0,0.7),
      0 0 120px rgba(230, 57, 70, 0.04);
    position: relative;
    background: #111118;
  }

  .player-container iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  footer {
    padding: 14px 28px;
    text-align: center;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.5px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }

  @media (max-width: 640px) {
    header { padding: 12px 16px; }
    .logo h1 { font-size: 1.1rem; }
    .badge { padding: 5px 10px; font-size: 0.65rem; }
    .player-wrapper { padding: 8px; }
    .player-container { border-radius: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="live-dot"></div>
    <h1>goulou lhamdoulah c sans pub hhhhh</h1>
  </div>
  <div class="badge">
    <span>● LIVE</span>
  </div>
</header>

<div class="player-wrapper">
  <div class="player-container">
    <iframe
      src="https://z1.depoooo.com/albaplayer/bein-2/"
      allowfullscreen
      allow="autoplay; encrypted-media; fullscreen"
      scrolling="no"
      referrerpolicy="no-referrer"
    ></iframe>
  </div>
</div>

<footer>fen a drari &mdash; live stream</footer>

</body>
</html>
