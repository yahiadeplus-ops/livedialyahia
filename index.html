<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fen a drari</title>
    <link rel="preconnect" href="https://www.lopir.xyz" crossorigin>
    <link rel="dns-prefetch" href="//www.lopir.xyz">
    <style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0a0e27;min-height:100vh;display:flex;flex-direction:column}
.container{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:20px}
.top-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
h1{color:#fff;font-size:18px;font-weight:800;margin:0;text-align:center}
h1 span{background:linear-gradient(135deg,#7877c6,#ff80c0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.player-wrapper{background:linear-gradient(145deg,#1a1f3a,#0f1225);border-radius:16px 16px 0 0;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.4);border:2px solid rgba(120,119,198,0.3);border-bottom:none}
.player-container{position:relative;width:100%;padding-top:56.25%;background:#000;transform:translateZ(0);contain:layout paint}
@supports(aspect-ratio:16/9){.player-container{padding-top:0;aspect-ratio:16/9}}
.player-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;display:block}
.player-loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000;z-index:2;pointer-events:none;transition:opacity .25s ease}
.player-loader::before{content:"";width:42px;height:42px;border:3px solid rgba(255,255,255,0.12);border-top-color:#a5a4e3;border-radius:50%;animation:plSpin .9s linear infinite}
@keyframes plSpin{to{transform:rotate(360deg)}}
.source-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.04);flex-wrap:wrap}
.source-label{font-size:.7rem;font-weight:600;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px}
.source-btn{padding:8px 20px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .25s}
.source-btn:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8)}
.source-btn.active{background:linear-gradient(135deg,#7877c6,#a855f7);color:#fff;border-color:transparent;box-shadow:0 4px 15px rgba(120,119,198,0.4)}
.match-strip{background:linear-gradient(180deg,#1e2338 0%,#1a1f32 100%);border-radius:0 0 16px 16px;border:1px solid rgba(120,119,198,0.15);border-top:1px solid rgba(255,255,255,0.06);overflow:hidden}
.strip-status-bar{display:flex;align-items:center;justify-content:center;padding:6px 12px;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;gap:6px}
.strip-live-dot{width:6px;height:6px;background:#ff4444;border-radius:50%;display:inline-block;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.strip-main{display:grid;grid-template-columns:1fr auto 1fr;align-items:center}
.strip-team{display:flex;align-items:center;gap:10px;padding:12px 16px;min-width:0}
.strip-team.home{justify-self:start}.strip-team.away{justify-self:end}
.strip-team-logo{width:30px;height:30px;border-radius:50%;object-fit:contain;flex-shrink:0}
.strip-team-info{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1 1 auto}
.strip-team-name{font-weight:700;font-size:14px;color:rgba(255,255,255,0.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.strip-team-icons{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.4)}
.strip-icon{display:inline-flex;align-items:center;gap:2px}
.card-y{display:inline-block;width:7px;height:10px;background:#fbbf24;border-radius:1px}
.card-r{display:inline-block;width:7px;height:10px;background:#ef4444;border-radius:1px}
.strip-center{display:flex;flex-direction:column;align-items:center;padding:8px 20px;gap:3px;border-left:1px solid rgba(255,255,255,0.05);border-right:1px solid rgba(255,255,255,0.05)}
.strip-score{display:flex;align-items:center;gap:8px}
.strip-score-num{font-size:28px;font-weight:900;min-width:26px;text-align:center;line-height:1;color:#fff}
.strip-score-sep{font-size:20px;color:rgba(255,255,255,0.2)}
.strip-scorers{display:none;border-top:1px solid rgba(255,255,255,0.05);padding:8px 16px;background:rgba(0,0,0,0.15)}
.strip-scorers.has-goals{display:grid;grid-template-columns:1fr auto 1fr;align-items:start}
.scorers-col{display:flex;flex-direction:column;gap:3px}
.scorers-col.home{align-items:flex-start;justify-self:start}.scorers-col.away{align-items:flex-end;justify-self:end}
.scorer{font-size:12px;color:rgba(255,255,255,0.85);display:flex;align-items:center;gap:4px;font-weight:500}
.scorer .min{font-size:10px;color:rgba(255,255,255,0.45);font-weight:700}
.scorers-ball{display:flex;align-items:center;justify-content:center;padding:0 8px;color:rgba(255,255,255,0.2)}
.scorers-ball svg{width:14px;height:14px;fill:currentColor}
.match-info-section{margin-top:10px;display:flex;flex-direction:column;gap:10px}
.match-info-card{background:linear-gradient(145deg,#1a1f3a,#0f1225);border-radius:14px;padding:14px 16px;border:1px solid rgba(120,119,198,0.12)}
.stats-list{display:flex;flex-direction:column;gap:14px;padding:4px 2px;max-width:560px;margin:0 auto;width:100%}
.stat-row{display:flex;flex-direction:column;gap:6px}
.stat-name{font-size:11px;color:rgba(255,255,255,0.55);font-weight:600;text-align:center;letter-spacing:.6px;text-transform:uppercase}
.stat-line{display:flex;align-items:center;gap:12px}
.stat-val{font-size:14px;font-weight:800;color:#fff;min-width:36px;flex-shrink:0;font-variant-numeric:tabular-nums}
.stat-val.away{text-align:left}.stat-val.home{text-align:right}
.stat-val.lead{color:#fff}.stat-val.trail{color:rgba(255,255,255,0.55)}
.stat-bars{flex:1 1 0;min-width:0;display:flex;height:6px;border-radius:6px;overflow:hidden;background:rgba(255,255,255,0.06);gap:2px}
.stat-bar-home{height:100%;background:linear-gradient(90deg,#4caf50,#66bb6a);transition:width .8s;border-radius:0 6px 6px 0}
.stat-bar-away{height:100%;background:linear-gradient(90deg,#7d7cd1,#a5a4e3);transition:width .8s;border-radius:6px 0 0 6px}
#matchInfoCard .mi-heading{display:flex;align-items:center;gap:12px;font-size:15px;color:#fff;font-weight:800;padding:4px 6px 14px;border-bottom:1px solid rgba(255,255,255,.08);margin:0 0 14px;justify-content:center}
#matchInfoCard .mi-heading::before,#matchInfoCard .mi-heading::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,transparent,rgba(167,164,227,.45),transparent);border-radius:2px}
#matchInfoCard .mi-item{display:flex;align-items:center;gap:12px;padding:14px 12px;border-radius:10px;background:rgba(255,255,255,.02);margin:0 auto 8px;max-width:560px;width:100%}
#matchInfoCard .mi-item:last-child{margin-bottom:0}
#matchInfoCard .mi-icwrap{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(167,164,227,.1);border:1px solid rgba(167,164,227,.18);border-radius:10px;flex-shrink:0;font-size:16px}
#matchInfoCard .mi-body{flex:1;min-width:0}
#matchInfoCard .mi-body .mi-lbl{display:block;font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.7px;font-weight:700;margin-bottom:3px}
#matchInfoCard .mi-body .mi-val{font-size:13px;font-weight:600;color:#fff}
#matchInfoCard .mi-body .mi-sub{display:block;font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
#matchInfoCard .mi-channels{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
#matchInfoCard .mi-chan{display:inline-flex;font-size:11px;font-weight:700;background:linear-gradient(135deg,#7877c6,#a855f7);color:#fff;padding:3px 10px;border-radius:5px}
footer{padding:14px 28px;text-align:center;font-size:.7rem;color:rgba(255,255,255,0.2);border-top:1px solid rgba(255,255,255,0.04);margin-top:16px}
@media(max-width:768px){.container{padding:15px}.player-container{padding-top:80%}@supports(aspect-ratio:5/4){.player-container{padding-top:0;aspect-ratio:5/4}}}
@media(max-width:600px){.strip-main{grid-template-columns:minmax(0,1fr) auto minmax(0,1fr)}.strip-team{padding:10px 8px;gap:6px}.strip-team-logo{width:24px;height:24px}.strip-team-name{font-size:12px}.strip-center{padding:6px 10px}.strip-score-num{font-size:22px}.source-btn{padding:7px 14px;font-size:.75rem}}
@media(max-width:480px){.container{padding:10px}.player-container{padding-top:110%}@supports(aspect-ratio:10/11){.player-container{padding-top:0;aspect-ratio:10/11}}.stats-list{gap:11px}.stat-val{font-size:12px;min-width:30px}.stat-bars{height:5px}}
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1><span>goulou lhamdoulah c sans pub hhhhh</span></h1>
        </div>

        <div class="source-bar">
            <span class="source-label">Source :</span>
            <button class="source-btn active" id="btnSrc1" onclick="switchSource(1)">Source 1</button>
            <button class="source-btn" id="btnSrc2" onclick="switchSource(2)">Source 2</button>
            <button class="source-btn" id="btnSrc3" onclick="switchSource(3)">Source 3</button>
        </div>

        <div class="player-wrapper">
            <div class="player-container">
                <div class="player-loader" id="playerLoader"></div>
                <iframe id="player" allowfullscreen scrolling="no"
                    allow="autoplay; encrypted-media; picture-in-picture; fullscreen"></iframe>
            </div>
        </div>

        <div class="match-strip" id="matchStrip" style="visibility:hidden;min-height:96px">
            <div class="strip-status-bar" id="stripStatusBar">--</div>
            <div class="strip-main">
                <div class="strip-team away">
                    <img class="strip-team-logo" id="stripAwayLogo" src="" alt="" width="30" height="30">
                    <div class="strip-team-info">
                        <span class="strip-team-name" id="stripAwayName">---</span>
                        <span class="strip-team-icons" id="stripAwayIcons"></span>
                    </div>
                </div>
                <div class="strip-center">
                    <div class="strip-score">
                        <span class="strip-score-num away" id="stripAwayScore">-</span>
                        <span class="strip-score-sep">-</span>
                        <span class="strip-score-num home" id="stripHomeScore">-</span>
                    </div>
                </div>
                <div class="strip-team home">
                    <div class="strip-team-info" style="align-items:flex-end">
                        <span class="strip-team-name" id="stripHomeName">---</span>
                        <span class="strip-team-icons" id="stripHomeIcons"></span>
                    </div>
                    <img class="strip-team-logo" id="stripHomeLogo" src="" alt="" width="30" height="30">
                </div>
            </div>
            <div class="strip-scorers" id="stripScorers">
                <div class="scorers-col away" id="scorersAway"></div>
                <div class="scorers-ball"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 14"><g clip-path="url(#lb)"><path d="m9.5 5.83-2.76 1v3.02l2.08.81 2.07-2.29z"/><path d="M7 0C3.14 0 0 3.14 0 7s3.14 7 7 7 7-3.14 7-7-3.14-7-7-7m0 12.26c-.97 0-1.88-.27-2.66-.73l.25-1.38-1.55-1.73-.94.48A5.2 5.2 0 0 1 1.74 7v-.17l2.01-.72.66-2.48-.92-.55a5.24 5.24 0 0 1 3.5-1.35c.1 0 .19 0 .29.01l-.29 1.07 2.72 1.15.88-.81c1.02.96 1.67 2.32 1.67 3.83 0 2.9-2.36 5.27-5.26 5.27z"/></g><defs><clipPath id="lb"><path fill="#fff" d="M0 0h14v14H0z"/></clipPath></defs></svg></div>
                <div class="scorers-col home" id="scorersHome"></div>
            </div>
        </div>

        <div class="match-info-section" id="matchInfoSection" style="display:none">
            <div class="match-info-card" id="matchStatsCard" style="display:none">
                <div class="stats-list" id="statsList"></div>
            </div>
            <div class="match-info-card" id="matchInfoCard" style="display:none">
                <div id="matchWinDesc" style="display:none;font-size:12px;font-weight:700;color:#a5a4e3;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.28);border-radius:10px;padding:8px 12px;text-align:center;margin-bottom:10px"></div>
                <h2 class="mi-heading" id="matchInfoHeading">Match Info</h2>
                <div class="mi-item" id="miRefereeItem" style="display:none">
                    <div class="mi-icwrap">⚖️</div>
                    <div class="mi-body"><span class="mi-lbl">Referee</span><div class="mi-val" id="miRefereeVal"></div></div>
                </div>
                <div class="mi-item" id="miVenueItem" style="display:none">
                    <div class="mi-icwrap">🏟️</div>
                    <div class="mi-body"><span class="mi-lbl">Stadium</span><div class="mi-val" id="miVenueVal"></div><span class="mi-sub" id="miVenueSub" style="display:none"></span></div>
                </div>
                <div class="mi-item" id="miChannelsItem" style="display:none">
                    <div class="mi-icwrap">📺</div>
                    <div class="mi-body"><span class="mi-lbl">TV Channels</span><div class="mi-channels" id="miChannelsList"></div></div>
                </div>
            </div>
        </div>
    </div>

    <footer>fen a drari — live stream</footer>

    <script>
    (function(){
        'use strict';
        var SOURCES = {
            1: 'https://junkieembeds.pages.dev/embed/beinsportsmax-sa',
            2: 'https://junkieembeds.pages.dev/embed/fox-usa',
            3: 'https://z1.depoooo.com/albaplayer/bein-2/'
        };
        var player = document.getElementById('player');
        var loader = document.getElementById('playerLoader');

        player.addEventListener('load', function(){
            loader.style.opacity='0'; loader.style.visibility='hidden';
        });

        window.switchSource = function(num){
            for(var i=1;i<=3;i++) document.getElementById('btnSrc'+i).classList.toggle('active',i===num);
            loader.style.opacity='1'; loader.style.visibility='visible';
            setTimeout(function(){ loader.style.opacity='0'; loader.style.visibility='hidden'; },8000);
            player.src = SOURCES[num];
        };

        switchSource(1);

        // === Match data ===
        var API_BASE = 'https://www.lopir.xyz';
        var matchId = new URLSearchParams(location.search).get('match') || '4627856';
        function TEAM_IMG(id){ return API_BASE+'/team/'+id; }

        function fetchT(url,ms){
            var c=new AbortController();var t=setTimeout(function(){c.abort();},ms||10000);
            return fetch(url,{signal:c.signal}).finally(function(){clearTimeout(t);});
        }

        setTimeout(loadMatchData, 1500);
        setInterval(loadMatchData, 60000);

        async function loadMatchData(){
            try {
                var r=await Promise.all([fetchT(API_BASE+'/game/'+matchId),fetchT(API_BASE+'/stats/'+matchId)]);
                var gd=await r[0].json(), sd=await r[1].json();
                var game=gd.game||(gd.games&&gd.games[0]);
                if(!game) return;
                var home=game.homeCompetitor, away=game.awayCompetitor;
                document.getElementById('stripHomeLogo').src=TEAM_IMG(home.id);
                document.getElementById('stripAwayLogo').src=TEAM_IMG(away.id);
                document.getElementById('stripHomeName').textContent=home.name;
                document.getElementById('stripAwayName').textContent=away.name;

                var sb=document.getElementById('stripStatusBar');
                var sg=game.statusGroup, noSc=home.score==null||home.score<0, up=sg===1||noSc;
                if(!up&&(sg===2||sg===3)){
                    var gtd=game.gameTimeDisplay||'',stxt=game.statusText||'';
                    sb.innerHTML='<span class="strip-live-dot"></span> '+(gtd.includes("'")?gtd:(stxt||gtd||'LIVE'));
                    sb.style.color='#ff4444';
                } else if(sg===4){ sb.textContent='FT'; }
                else if(up){ var t=new Date(game.startTime);sb.innerHTML='🕐 '+t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});sb.style.color='#a5a4e3'; }

                var sc=document.querySelector('.strip-center');
                if(up) sc.innerHTML='<div style="font-size:13px;color:rgba(255,255,255,0.4);padding:6px 0">VS</div>';
                else sc.innerHTML='<div class="strip-score"><span class="strip-score-num away">'+Math.floor(away.score)+'</span><span class="strip-score-sep">-</span><span class="strip-score-num home">'+Math.floor(home.score)+'</span></div>';

                if(!up){
                    var sMap={};
                    (sd.statistics||[]).forEach(function(s){if(!sMap[s.competitorId])sMap[s.competitorId]={};sMap[s.competitorId][s.id]=s.value;});
                    document.getElementById('stripHomeIcons').innerHTML=buildIcons(sMap[home.id]||{});
                    document.getElementById('stripAwayIcons').innerHTML=buildIcons(sMap[away.id]||{});
                    var hs=sMap[home.id]||{},as=sMap[away.id]||{};
                    var defs=[{id:10,name:'Possession',pct:1},{id:76,name:'xG'},{id:24,name:'Big Chances'},{id:3,name:'Total Shots'},{id:4,name:'Shots on Target'}];
                    var sh='';
                    defs.forEach(function(s){
                        var hv=hs[s.id],av=as[s.id];if(hv==null&&av==null)return;
                        var hn=parseFloat(hv)||0,an=parseFloat(av)||0;
                        if(s.pct){if(hv!=null&&av==null){an=100-hn;av=an+'%';}else if(av!=null&&hv==null){hn=100-an;hv=hn+'%';}}
                        var tot=hn+an,awP=tot>0?(an/tot)*100:50,hmP=tot>0?(hn/tot)*100:50;
                        var awC=tot>0&&an>hn?' lead':tot>0&&an<hn?' trail':'';
                        var hmC=tot>0&&hn>an?' lead':tot>0&&hn<an?' trail':'';
                        sh+='<div class="stat-row"><div class="stat-name">'+s.name+'</div><div class="stat-line"><div class="stat-val away'+awC+'">'+(av||'0')+'</div><div class="stat-bars"><div class="stat-bar-away" style="width:'+awP+'%"></div><div class="stat-bar-home" style="width:'+hmP+'%"></div></div><div class="stat-val home'+hmC+'">'+(hv||'0')+'</div></div></div>';
                    });
                    if(sh){document.getElementById('statsList').innerHTML=sh;document.getElementById('matchStatsCard').style.display='';document.getElementById('matchInfoSection').style.display='';}
                }

                try{
                    var off=game.officials||[],ref=(off[0]&&off[0].name)||'',ven=(game.venue&&game.venue.name)||'';
                    var cap=game.venue&&game.venue.capacity?parseInt(game.venue.capacity):0;
                    var ch=(game.tvNetworks||[]).filter(function(t){return t&&t.type===1&&t.name;}).map(function(t){return t.name;});
                    var wd=game.winDescription||'',cnt=0;
                    if(ref){document.getElementById('miRefereeVal').textContent=ref;document.getElementById('miRefereeItem').style.display='';cnt++;}
                    if(ven){document.getElementById('miVenueVal').textContent=ven;if(cap){var su=document.getElementById('miVenueSub');su.textContent='Capacity: '+cap.toLocaleString();su.style.display='';}document.getElementById('miVenueItem').style.display='';cnt++;}
                    if(ch.length){var cl=document.getElementById('miChannelsList');cl.innerHTML='';ch.forEach(function(c){var sp=document.createElement('span');sp.className='mi-chan';sp.textContent=c;cl.appendChild(sp);});document.getElementById('miChannelsItem').style.display='';cnt++;}
                    if(wd){var b=document.getElementById('matchWinDesc');b.textContent=wd;b.style.display='';}
                    if(cnt>0||wd){document.getElementById('matchInfoCard').style.display='';document.getElementById('matchInfoSection').style.display='';}
                }catch(_){}

                var mem={};(game.members||[]).forEach(function(m){mem[m.id]=m;});
                var goals=(game.events||[]).filter(function(e){return e.eventType&&e.eventType.id===1&&e.stageId!==11;});
                var hG='',aG='';
                goals.forEach(function(g){var s=mem[g.playerId];var n=s?(s.name||s.shortName||'?'):'?';var m=g.gameTimeDisplay||'';var l='<span class="scorer">'+n+' <span class="min" dir="ltr">'+m+'</span></span>';if(g.competitorId===home.id)hG+=l;else aG+=l;});
                document.getElementById('scorersHome').innerHTML=hG;
                document.getElementById('scorersAway').innerHTML=aG;
                document.getElementById('stripScorers').classList.toggle('has-goals',goals.length>0);
                document.title=home.name+' vs '+away.name+' | fen a drari';
                requestAnimationFrame(function(){document.getElementById('matchStrip').style.visibility='visible';});
            }catch(e){setTimeout(loadMatchData,5000);}
        }

        function buildIcons(st){
            var h='',co=st[8]||'0',y=parseInt(st[1])||0,r=parseInt(st[2])||0;
            h+='<span class="strip-icon">'+co+'<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M1 3a1 1 0 0 1 2 0v7.041A11.994 11.994 0 0 1 13.958 21H21a1 1 0 1 1 0 2H2a1 1 0 0 1-1-1zm2 18h8.95A9.994 9.994 0 0 0 3 12.05z"/></svg></span>';
            if(y>0)h+='<span class="strip-icon">'+y+'<span class="card-y"></span></span>';
            if(r>0)h+='<span class="strip-icon">'+r+'<span class="card-r"></span></span>';
            return h;
        }
    })();
    </script>
</body>
</html>
